name: Sync & Merge nyanBOX Firmware

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write # Required to push merged binaries back to the repo

jobs:
  sync-and-merge:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout this repository
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Download latest nyanBOX binaries and BWifiKill and Get Versions
    - name: Sync Firmware Files
      run: |
        mkdir -p firmware
        
        # Query latest releases JSON of BWifiKill
        BWIFI_RELEASE=$(curl -s https://api.github.com/repos/pepeangell5/BWifiKill-ESP32-V4.0/releases/latest)
        BWIFI_URL=$(echo "$BWIFI_RELEASE" | grep -oP '"browser_download_url": "\K[^"]+\.bin' | head -n 1)
        
        if [ ! -z "$BWIFI_URL" ]; then
          echo "Downloading BWifiKill from $BWIFI_URL"
          curl -L -o firmware/Bwifikill_MERGED.bin "$BWIFI_URL"
          
          # Extract version from URL (e.g. BWifiKill-ESP32-V4.0-full.bin -> V4.0)
          BWIFI_VERSION=$(echo "$BWIFI_URL" | grep -oP 'BWifiKill-ESP32-\KV[^/-]+' | head -n 1 | tr '[:upper:]' '[:lower:]')
          if [ -z "$BWIFI_VERSION" ]; then
            BWIFI_VERSION="v4.0"
          fi
        else
          echo "Warning: Could not find BWifiKill release asset URL"
          BWIFI_VERSION="v4.0"
        fi
        
        # Query nyanBOX repo contents of the firmware folder to get the version directory name
        FW_CONTENTS=$(curl -s https://api.github.com/repos/jbohack/nyanBOX/contents/firmware)
        NYANBOX_DIR=$(echo "$FW_CONTENTS" | grep -oP '"name": "\Knyanbox-v[^"]+' | head -n 1)
        
        if [ ! -z "$NYANBOX_DIR" ]; then
          echo "Found nyanBOX version directory: $NYANBOX_DIR"
          NYANBOX_VERSION=$(echo "$NYANBOX_DIR" | sed 's/nyanbox-//')
          
          # Construct download URLs
          BOOTLOADER_URL="https://raw.githubusercontent.com/jbohack/nyanBOX/main/firmware/$NYANBOX_DIR/bootloader.bin"
          PARTITIONS_URL="https://raw.githubusercontent.com/jbohack/nyanBOX/main/firmware/$NYANBOX_DIR/partitions.bin"
          FIRMWARE_URL="https://raw.githubusercontent.com/jbohack/nyanBOX/main/firmware/$NYANBOX_DIR/nyanbox.bin"
          
          echo "Downloading nyanBOX separate binary files..."
          curl -L -o firmware/nyanbox_bootloader.bin "$BOOTLOADER_URL"
          curl -L -o firmware/nyanbox_partitions.bin "$PARTITIONS_URL"
          curl -L -o firmware/nyanbox_firmware.bin "$FIRMWARE_URL"
        else
          echo "Warning: Could not find nyanBOX version directory, using fallbacks"
          NYANBOX_VERSION="v4.41.17"
          curl -L -o firmware/nyanbox_bootloader.bin "https://raw.githubusercontent.com/jbohack/nyanBOX/main/firmware/nyanbox-v4.41.17/bootloader.bin"
          curl -L -o firmware/nyanbox_partitions.bin "https://raw.githubusercontent.com/jbohack/nyanBOX/main/firmware/nyanbox-v4.41.17/partitions.bin"
          curl -L -o firmware/nyanbox_firmware.bin "https://raw.githubusercontent.com/jbohack/nyanBOX/main/firmware/nyanbox-v4.41.17/nyanbox.bin"
        fi
        
        # Patch bootloader.bin to DIO flash mode (0x02) at byte offset 2
        echo "Patching bootloader.bin to DIO flash mode (0x02)..."
        python3 -c "with open('firmware/nyanbox_bootloader.bin', 'rb+') as f: f.seek(2); f.write(b'\x02')"
        
        # Save version mappings to versions.json
        echo "Creating versions.json with nyanbox: $NYANBOX_VERSION, bwifikill: $BWIFI_VERSION"
        echo "{\"nyanbox\": \"$NYANBOX_VERSION\", \"bwifikill\": \"$BWIFI_VERSION\"}" > firmware/versions.json

    # 3. Commit and push the updated binaries and versions back to repo
    - name: Commit and Push Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto-sync: Download latest nyanBOX separate binaries, BWifiKill, and versions"
        file_pattern: "firmware/nyanbox_*.bin firmware/Bwifikill_MERGED.bin firmware/versions.json"
